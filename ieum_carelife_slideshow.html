<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이음케어라이프 후불제상조</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0a06;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .slideshow-wrapper {
    position: relative;
    width: 720px;
    max-width: 100vw;
    aspect-ratio: 4/3;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 50px 130px rgba(0,0,0,0.9),
      0 0 0 1px rgba(176,142,87,0.2),
      inset 0 0 0 1px rgba(255,255,255,0.03);
  }

  /* ── slides ── */
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0s;
  }
  .slide.active {
    opacity: 1;
    animation: kenBurns 5.8s ease-out forwards;
  }
  .slide.exit {
    opacity: 0;
    transition: opacity 1.1s ease-in-out;
  }
  @keyframes kenBurns {
    from { transform: scale(1.08); }
    to   { transform: scale(1.0); }
  }
  .slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Dark cinematic overlay */
  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to top, rgba(8,6,3,0.95) 0%, rgba(8,6,3,0.55) 38%, rgba(8,6,3,0.2) 60%, transparent 78%),
      linear-gradient(to right, rgba(8,6,3,0.6) 0%, transparent 60%);
  }

  /* ── UI Layer ── */
  .ui-layer {
    position: absolute; inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  /* Gold top border line */
  .gold-line-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent 0%, #b08e57 30%, #d4af70 50%, #b08e57 70%, transparent 100%);
    opacity: 0;
    transition: opacity 0.6s 0.1s;
  }
  .gold-line-top.show { opacity: 1; }

  /* Gold bottom border line */
  .gold-line-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent 0%, #b08e57 25%, #d4af70 50%, #b08e57 75%, transparent 100%);
    opacity: 0.4;
  }

  /* Top header */
  .top-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(to bottom, rgba(8,6,3,0.75), transparent);
    display: flex;
    align-items: center;
    padding: 0 24px;
    justify-content: space-between;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.5s 0.12s;
  }
  .brand-logo.show { opacity: 1; transform: translateY(0); }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #b08e57, #d4af70, #8a6d3b);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    box-shadow: 0 0 10px rgba(176,142,87,0.5);
  }

  .brand-text {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.06em;
    font-family: 'Noto Serif KR', serif;
  }

  .badge {
    background: linear-gradient(135deg, rgba(176,142,87,0.85), rgba(212,175,112,0.75));
    backdrop-filter: blur(8px);
    border: 1px solid rgba(176,142,87,0.4);
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.1em;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.5s 0.18s;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  .badge.show { opacity: 1; transform: translateY(0); }

  /* Left gold accent bar */
  .accent-bar {
    position: absolute;
    left: 0; bottom: 0;
    width: 4px; height: 50%;
    background: linear-gradient(to top, #b08e57, #d4af70 60%, transparent);
  }

  /* Corner ornament top-left */
  .ornament-tl {
    position: absolute;
    top: 52px; left: 20px;
    width: 30px; height: 30px;
    border-top: 2px solid rgba(176,142,87,0.5);
    border-left: 2px solid rgba(176,142,87,0.5);
    opacity: 0;
    transition: opacity 0.5s 0.2s;
  }
  .ornament-tl.show { opacity: 1; }

  /* Corner ornament bottom-right */
  .ornament-br {
    position: absolute;
    bottom: 52px; right: 20px;
    width: 24px; height: 24px;
    border-bottom: 1px solid rgba(176,142,87,0.35);
    border-right: 1px solid rgba(176,142,87,0.35);
  }

  /* Step label */
  .step-label {
    position: absolute;
    bottom: 204px; left: 28px;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.28em;
    color: #c4a052;
    text-transform: uppercase;
    opacity: 0;
    transform: translateX(-14px);
    transition: all 0.5s 0.32s;
  }
  .step-label.show { opacity: 1; transform: translateX(0); }

  /* Gold divider */
  .divider {
    position: absolute;
    bottom: 196px; left: 28px;
    width: 44px; height: 1px;
    background: linear-gradient(to right, #b08e57, transparent);
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left;
    transition: all 0.5s 0.42s;
  }
  .divider.show { opacity: 1; transform: scaleX(1); }

  /* Main title */
  .main-title {
    position: absolute;
    bottom: 140px; left: 28px;
    font-size: 30px;
    font-weight: 900;
    line-height: 1.3;
    color: #fff;
    font-family: 'Noto Serif KR', serif;
    text-shadow: 0 2px 24px rgba(0,0,0,0.7);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.58s 0.5s;
    white-space: pre-line;
  }
  .main-title.show { opacity: 1; transform: translateY(0); }

  /* Sub text */
  .sub-text {
    position: absolute;
    bottom: 114px; left: 28px;
    font-size: 12px;
    font-weight: 400;
    color: rgba(220,195,145,0.85);
    letter-spacing: 0.03em;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s 0.65s;
    max-width: 500px;
  }
  .sub-text.show { opacity: 1; transform: translateY(0); }

  /* Checklist */
  .checklist {
    position: absolute;
    bottom: 36px; left: 28px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .check-item {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,248,230,0.88);
    background: rgba(176,142,87,0.1);
    border: 1px solid rgba(176,142,87,0.22);
    border-radius: 3px;
    padding: 4px 12px;
    display: inline-block;
    opacity: 0;
    transform: translateX(-12px);
    transition: all 0.4s;
    backdrop-filter: blur(3px);
    width: fit-content;
  }
  .check-item.show { opacity: 1; transform: translateX(0); }

  /* Progress area */
  .progress-area {
    position: absolute;
    bottom: 22px; right: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .slide-counter {
    font-size: 11px;
    color: rgba(176,142,87,0.6);
    font-weight: 700;
    letter-spacing: 0.12em;
    font-family: 'Noto Serif KR', serif;
  }
  .progress-track {
    width: 70px; height: 2px;
    background: rgba(176,142,87,0.15);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, #b08e57, #d4af70);
    border-radius: 1px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Dots */
  .dots {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 9px;
    pointer-events: all;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(176,142,87,0.25);
    border: 1px solid rgba(176,142,87,0.3);
    transition: all 0.35s;
    cursor: pointer;
  }
  .dot.active {
    background: #b08e57;
    width: 22px;
    border-radius: 3px;
    border-color: #b08e57;
    box-shadow: 0 0 8px rgba(176,142,87,0.5);
  }

  /* Floating gold particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(176,142,87,0.6);
    animation: riseUp linear infinite;
    opacity: 0;
  }
  @keyframes riseUp {
    0%   { opacity:0; transform: translateY(0) scale(1); }
    20%  { opacity:0.7; }
    100% { opacity:0; transform: translateY(-90px) scale(0.2); }
  }

  /* Vignette */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="slideshow-wrapper" id="wrapper">

  <div id="slides-container"></div>

  <div class="ui-layer" id="ui">
    <div class="vignette"></div>
    <div class="gold-line-top" id="gold-line-top"></div>
    <div class="gold-line-bottom"></div>
    <div class="accent-bar"></div>
    <div class="ornament-tl" id="ornament-tl"></div>
    <div class="ornament-br"></div>

    <!-- Top header -->
    <div class="top-header">
      <div class="brand-logo" id="brand-logo">
        <div class="logo-icon">🕊</div>
        <span class="brand-text">이음케어라이프</span>
      </div>
      <div class="badge" id="badge">후불제 상조서비스</div>
    </div>

    <!-- Content -->
    <div class="step-label" id="step-label">이음케어라이프</div>
    <div class="divider" id="divider"></div>
    <div class="main-title" id="main-title">후불제 상조서비스</div>
    <div class="sub-text" id="sub-text">장례 후 실제 사용한 비용만 투명하게 정산합니다</div>

    <div class="checklist" id="checklist">
      <div class="check-item" id="ci0"></div>
      <div class="check-item" id="ci1"></div>
      <div class="check-item" id="ci2"></div>
    </div>

    <!-- Progress -->
    <div class="progress-area">
      <div class="slide-counter" id="counter">01 / 05</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="dots" id="dots"></div>

    <!-- Gold particles -->
    <div class="particle" style="left:7%;bottom:185px;width:3px;height:3px;animation-duration:4.2s;animation-delay:0s;"></div>
    <div class="particle" style="left:12%;bottom:165px;width:2px;height:2px;animation-duration:5.5s;animation-delay:1.5s;"></div>
    <div class="particle" style="left:4%;bottom:210px;width:4px;height:4px;animation-duration:3.8s;animation-delay:2.8s;"></div>
    <div class="particle" style="left:18%;bottom:175px;width:2px;height:2px;animation-duration:6.2s;animation-delay:0.9s;"></div>
    <div class="particle" style="left:9%;bottom:195px;width:3px;height:3px;animation-duration:4.8s;animation-delay:3.5s;"></div>
  </div>

</div>

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

const slides = container.querySelectorAll('.slide');
const dots = dotsEl.querySelectorAll('.dot');

function showUI(cap) {
  checkTimers.forEach(t => clearTimeout(t));
  checkTimers = [];

  const uiEls = [goldLineTop, ornamentTl, brandLogo, badge, stepLabel, divider, mainTitle, subText];
  uiEls.forEach(el => el.classList.remove('show'));
  checkItems.forEach(el => { el.classList.remove('show'); el.textContent = ''; });

  stepLabel.textContent = cap.step;
  mainTitle.textContent = cap.title;
  subText.textContent = cap.sub;
  cap.checks.forEach((txt, i) => { checkItems[i].textContent = txt; });

  requestAnimationFrame(() => requestAnimationFrame(() => {
    uiEls.forEach(el => el.classList.add('show'));
    cap.checks.forEach((_, i) => {
      const t = setTimeout(() => checkItems[i].classList.add('show'), 780 + i * 130);
      checkTimers.push(t);
    });
  }));
}

function updateDots(idx) {
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  counter.textContent = String(idx+1).padStart(2,'0') + ' / ' + String(images.length).padStart(2,'0');
}

function startProgress() {
  progressFill.style.transition = 'none';
  progressFill.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    progressFill.style.transition = `width ${SLIDE_DURATION}ms linear`;
    progressFill.style.width = '100%';
  }));
}

function goTo(idx) {
  if (idx === current) return;
  clearTimeout(timer);
  const prev = current;
  current = idx;

  slides[prev].classList.remove('active');
  slides[prev].classList.add('exit');
  setTimeout(() => slides[prev].classList.remove('exit'), TRANSITION);

  slides[current].classList.add('active');
  updateDots(current);
  showUI(captions[current]);
  startProgress();
  timer = setTimeout(nextSlide, SLIDE_DURATION);
}

function nextSlide() { goTo((current + 1) % images.length); }

// Init
slides[0].classList.add('active');
updateDots(0);
showUI(captions[0]);
startProgress();
timer = setTimeout(nextSlide, SLIDE_DURATION);
</script>
</body>
