<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #060810;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .wrapper {
    position: relative;
    width: 720px;
    max-width: 100vw;
    aspect-ratio: 4/3;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 50px 140px rgba(0,0,0,0.9),
      0 0 0 1px rgba(176,142,87,0.25),
      inset 0 0 0 1px rgba(255,255,255,0.04);
  }

  /* ── Slides ── */
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0s;
  }
  .slide.active {
    opacity: 1;
    animation: kb 6s ease-out forwards;
  }
  .slide.exit {
    opacity: 0;
    transition: opacity 1.1s ease-in-out;
  }
  @keyframes kb {
    from { transform: scale(1.08); }
    to   { transform: scale(1.00); }
  }
  .slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to top,  rgba(4,6,16,0.95) 0%, rgba(4,6,16,0.52) 36%, rgba(4,6,16,0.15) 60%, transparent 78%),
      linear-gradient(to right, rgba(4,6,16,0.58) 0%, transparent 58%);
  }

  /* ── UI Layer ── */
  .ui { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

  /* Gold border top */
  .gold-top {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(to right, transparent, #b08e57 25%, #e0c070 50%, #b08e57 75%, transparent);
    opacity: 0; transition: opacity 0.6s 0.1s;
  }
  .gold-top.show { opacity: 1; }

  .gold-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(to right, transparent, #b08e57 20%, #e0c070 50%, #b08e57 80%, transparent);
    opacity: 0.35;
  }

  /* Left gold accent bar */
  .accent {
    position: absolute; left: 0; bottom: 0;
    width: 4px; height: 48%;
    background: linear-gradient(to top, #b08e57, #d4af70 55%, transparent);
  }

  /* Top header */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 58px;
    background: linear-gradient(to bottom, rgba(4,6,16,0.8), transparent);
    display: flex; align-items: center; padding: 0 22px;
    justify-content: space-between;
  }

  .brand {
    display: flex; align-items: center; gap: 9px;
    opacity: 0; transform: translateY(-8px);
    transition: all 0.5s 0.12s;
  }
  .brand.show { opacity: 1; transform: translateY(0); }

  .brand-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #8a6d3b, #d4af70, #8a6d3b);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    box-shadow: 0 0 12px rgba(176,142,87,0.55);
  }

  .brand-name {
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,0.88);
    letter-spacing: 0.05em;
    font-family: 'Noto Serif KR', serif;
  }

  .badge {
    background: linear-gradient(135deg, rgba(30,60,120,0.85), rgba(50,90,170,0.75));
    backdrop-filter: blur(8px);
    border: 1px solid rgba(80,130,200,0.4);
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 11px; font-weight: 700;
    color: #fff; letter-spacing: 0.09em;
    opacity: 0; transform: translateY(-8px);
    transition: all 0.5s 0.18s;
  }
  .badge.show { opacity: 1; transform: translateY(0); }

  /* Corner decorations */
  .corner-tl {
    position: absolute; top: 57px; left: 20px;
    width: 28px; height: 28px;
    border-top: 2px solid rgba(176,142,87,0.5);
    border-left: 2px solid rgba(176,142,87,0.5);
    opacity: 0; transition: opacity 0.5s 0.22s;
  }
  .corner-tl.show { opacity: 1; }

  .corner-br {
    position: absolute; bottom: 50px; right: 20px;
    width: 22px; height: 22px;
    border-bottom: 1px solid rgba(176,142,87,0.32);
    border-right: 1px solid rgba(176,142,87,0.32);
  }

  /* MOU badge (special) */
  .mou-tag {
    position: absolute; top: 66px; right: 22px;
    background: linear-gradient(135deg, #b08e57, #d4af70);
    border-radius: 4px;
    padding: 3px 12px;
    font-size: 10px; font-weight: 900;
    color: #fff; letter-spacing: 0.2em;
    opacity: 0; transform: translateX(10px);
    transition: all 0.5s 0.28s;
    text-transform: uppercase;
    box-shadow: 0 2px 10px rgba(176,142,87,0.4);
  }
  .mou-tag.show { opacity: 1; transform: translateX(0); }

  /* Step */
  .step {
    position: absolute; bottom: 208px; left: 28px;
    font-size: 10px; font-weight: 900;
    letter-spacing: 0.28em; color: #c4a052;
    opacity: 0; transform: translateX(-14px);
    transition: all 0.5s 0.32s;
  }
  .step.show { opacity: 1; transform: translateX(0); }

  /* Gold divider */
  .divider {
    position: absolute; bottom: 200px; left: 28px;
    width: 40px; height: 1px;
    background: linear-gradient(to right, #b08e57, transparent);
    opacity: 0; transform: scaleX(0); transform-origin: left;
    transition: all 0.48s 0.42s;
  }
  .divider.show { opacity: 1; transform: scaleX(1); }

  /* Main title */
  .title {
    position: absolute; bottom: 142px; left: 28px;
    font-size: 30px; font-weight: 900; line-height: 1.28;
    color: #fff;
    font-family: 'Noto Serif KR', serif;
    text-shadow: 0 2px 24px rgba(0,0,0,0.7);
    opacity: 0; transform: translateY(20px);
    transition: all 0.56s 0.5s;
    white-space: pre-line;
  }
  .title.show { opacity: 1; transform: translateY(0); }

  /* Sub text */
  .sub {
    position: absolute; bottom: 116px; left: 28px;
    font-size: 12px; font-weight: 400;
    color: rgba(220,195,145,0.88);
    letter-spacing: 0.03em;
    opacity: 0; transform: translateY(10px);
    transition: all 0.5s 0.64s;
    max-width: 500px;
  }
  .sub.show { opacity: 1; transform: translateY(0); }

  /* Checklist */
  .checklist {
    position: absolute; bottom: 36px; left: 28px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .ci {
    font-size: 12px; font-weight: 500;
    color: rgba(255,248,230,0.88);
    background: rgba(176,142,87,0.1);
    border: 1px solid rgba(176,142,87,0.22);
    border-radius: 3px;
    padding: 4px 12px;
    display: inline-block;
    opacity: 0; transform: translateX(-12px);
    transition: all 0.4s;
    backdrop-filter: blur(3px);
    width: fit-content;
  }
  .ci.show { opacity: 1; transform: translateX(0); }

  /* Progress */
  .prog-area {
    position: absolute; bottom: 22px; right: 24px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
  }
  .counter {
    font-size: 11px; color: rgba(176,142,87,0.6);
    font-weight: 700; letter-spacing: 0.12em;
    font-family: 'Noto Serif KR', serif;
  }
  .prog-track {
    width: 70px; height: 2px;
    background: rgba(176,142,87,0.15);
    border-radius: 1px; overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(to right, #b08e57, #d4af70);
    border-radius: 1px; width: 0%;
    transition: width 0.1s linear;
  }

  /* Dots */
  .dots {
    position: absolute; bottom: 14px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 9px;
    pointer-events: all;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(176,142,87,0.25);
    border: 1px solid rgba(176,142,87,0.3);
    transition: all 0.35s; cursor: pointer;
  }
  .dot.active {
    background: #b08e57; width: 22px; border-radius: 3px;
    border-color: #b08e57;
    box-shadow: 0 0 8px rgba(176,142,87,0.5);
  }

  /* Vignette */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 48%, rgba(0,0,0,0.48) 100%);
    pointer-events: none;
  }

  /* Gold particles */
  .pt {
    position: absolute; border-radius: 50%;
    background: rgba(176,142,87,0.55);
    animation: rise linear infinite; opacity: 0;
  }
  @keyframes rise {
    0%   { opacity:0; transform:translateY(0) scale(1); }
    18%  { opacity:0.7; }
    100% { opacity:0; transform:translateY(-95px) scale(0.2); }
  }

  /* Horizontal divider line between brand and content */
  .h-line {
    position: absolute; top: 58px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, rgba(176,142,87,0.4), rgba(176,142,87,0.05));
    opacity: 0; transition: opacity 0.5s 0.15s;
  }
  .h-line.show { opacity: 1; }
</style>
</head>

const slides = slidesEl.querySelectorAll('.slide');
const dots   = dotsEl.querySelectorAll('.dot');

const allUI = [gt, ctl, hl, brand, badge, mouTag, stepEl, dividerEl, titleEl, subEl];

function showUI(cap) {
  ckTimers.forEach(t => clearTimeout(t)); ckTimers = [];
  allUI.forEach(el => el.classList.remove('show'));
  cis.forEach(el => { el.classList.remove('show'); el.textContent = ''; });

  stepEl.textContent = cap.step;
  titleEl.textContent = cap.title;
  subEl.textContent   = cap.sub;
  cap.checks.forEach((t,i) => { cis[i].textContent = t; });

  requestAnimationFrame(() => requestAnimationFrame(() => {
    allUI.forEach(el => el.classList.add('show'));
    cap.checks.forEach((_,i) => {
      const t = setTimeout(() => cis[i].classList.add('show'), 800 + i*130);
      ckTimers.push(t);
    });
  }));
}

function updateDots(idx) {
  dots.forEach((d,i) => d.classList.toggle('active', i===idx));
  counterEl.textContent = String(idx+1).padStart(2,'0') + ' / ' + String(images.length).padStart(2,'0');
}

function startProg() {
  pfEl.style.transition = 'none'; pfEl.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    pfEl.style.transition = `width ${HOLD}ms linear`;
    pfEl.style.width = '100%';
  }));
}

function goTo(idx) {
  if (idx === cur) return;
  clearTimeout(timer);
  const prev = cur; cur = idx;
  slides[prev].classList.remove('active');
  slides[prev].classList.add('exit');
  setTimeout(() => slides[prev].classList.remove('exit'), TRANS);
  slides[cur].classList.add('active');
  updateDots(cur); showUI(captions[cur]); startProg();
  timer = setTimeout(next, HOLD);
}

function next() { goTo((cur+1) % images.length); }

slides[0].classList.add('active');
updateDots(0); showUI(captions[0]); startProg();
timer = setTimeout(next, HOLD);
</script>
</body>
</html>
