<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#060810;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
.wrapper{position:relative;width:720px;max-width:100vw;aspect-ratio:4/3;border-radius:18px;overflow:hidden;box-shadow:0 50px 140px rgba(0,0,0,0.9),0 0 0 1px rgba(90,154,58,0.3);}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 0s;}
.slide.active{opacity:1;animation:kb 6s ease-out forwards;}
.slide.exit{opacity:0;transition:opacity 1.1s ease-in-out;}
@keyframes kb{from{transform:scale(1.08);}to{transform:scale(1.00);}}
.slide img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(4,8,4,0.95) 0%,rgba(4,8,4,0.52) 36%,rgba(4,8,4,0.15) 60%,transparent 78%),linear-gradient(to right,rgba(4,8,4,0.58) 0%,transparent 58%);}
.ui{position:absolute;inset:0;z-index:10;pointer-events:none;}
.gold-top{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,transparent,#5a9a3a 20%,#a8d870 50%,#5a9a3a 80%,transparent);opacity:0;transition:opacity 0.6s 0.1s;}
.gold-top.show{opacity:1;}
.gold-bottom{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,#5a9a3a 20%,#a8d870 50%,#5a9a3a 80%,transparent);opacity:0.4;}
.accent{position:absolute;left:0;bottom:0;width:4px;height:48%;background:linear-gradient(to top,#4a8a2a,#8ac850 55%,transparent);}
.top-bar{position:absolute;top:0;left:0;right:0;height:58px;background:linear-gradient(to bottom,rgba(4,10,4,0.82),transparent);display:flex;align-items:center;padding:0 22px;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:9px;opacity:0;transform:translateY(-8px);transition:all 0.5s 0.12s;}
.brand.show{opacity:1;transform:translateY(0);}
.brand-icon{width:30px;height:30px;background:linear-gradient(135deg,#3a7a1a,#8ac850,#3a7a1a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 12px rgba(90,154,58,0.6);}
.brand-name{font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);letter-spacing:0.05em;font-family:'Noto Serif KR',serif;}
.badge{background:linear-gradient(135deg,rgba(40,110,20,0.88),rgba(70,160,40,0.78));backdrop-filter:blur(8px);border:1px solid rgba(100,180,60,0.45);border-radius:20px;padding:5px 16px;font-size:11px;font-weight:700;color:#fff;letter-spacing:0.09em;opacity:0;transform:translateY(-8px);transition:all 0.5s 0.18s;}
.badge.show{opacity:1;transform:translateY(0);}
.h-line{position:absolute;top:58px;left:0;right:0;height:1px;background:linear-gradient(to right,rgba(90,154,58,0.5),rgba(90,154,58,0.05));opacity:0;transition:opacity 0.5s 0.15s;}
.h-line.show{opacity:1;}
.mou-tag{position:absolute;top:66px;right:22px;background:linear-gradient(135deg,#4a8a2a,#8ac850);border-radius:4px;padding:3px 12px;font-size:10px;font-weight:900;color:#fff;letter-spacing:0.2em;opacity:0;transform:translateX(10px);transition:all 0.5s 0.28s;box-shadow:0 2px 10px rgba(90,154,58,0.45);}
.mou-tag.show{opacity:1;transform:translateX(0);}
.corner-tl{position:absolute;top:66px;left:20px;width:28px;height:28px;border-top:2px solid rgba(90,154,58,0.55);border-left:2px solid rgba(90,154,58,0.55);opacity:0;transition:opacity 0.5s 0.22s;}
.corner-tl.show{opacity:1;}
.corner-br{position:absolute;bottom:50px;right:20px;width:22px;height:22px;border-bottom:1px solid rgba(90,154,58,0.35);border-right:1px solid rgba(90,154,58,0.35);}
.step{position:absolute;bottom:208px;left:28px;font-size:10px;font-weight:900;letter-spacing:0.28em;color:#7cc045;opacity:0;transform:translateX(-14px);transition:all 0.5s 0.32s;}
.step.show{opacity:1;transform:translateX(0);}
.divider{position:absolute;bottom:200px;left:28px;width:40px;height:1px;background:linear-gradient(to right,#5a9a3a,transparent);opacity:0;transform:scaleX(0);transform-origin:left;transition:all 0.48s 0.42s;}
.divider.show{opacity:1;transform:scaleX(1);}
.title{position:absolute;bottom:130px;left:28px;font-size:26px;font-weight:900;line-height:1.3;color:#fff;font-family:'Noto Serif KR',serif;text-shadow:0 2px 24px rgba(0,0,0,0.7);opacity:0;transform:translateY(20px);transition:all 0.56s 0.5s;white-space:pre-line;}
.title.show{opacity:1;transform:translateY(0);}
.sub{position:absolute;bottom:104px;left:28px;font-size:12px;font-weight:400;color:rgba(180,230,140,0.88);letter-spacing:0.03em;opacity:0;transform:translateY(10px);transition:all 0.5s 0.64s;max-width:500px;}
.sub.show{opacity:1;transform:translateY(0);}
.checklist{position:absolute;bottom:36px;left:28px;display:flex;flex-direction:column;gap:5px;}
.ci{font-size:12px;font-weight:500;color:rgba(230,255,220,0.9);background:rgba(90,154,58,0.12);border:1px solid rgba(90,154,58,0.28);border-radius:3px;padding:4px 12px;display:inline-block;opacity:0;transform:translateX(-12px);transition:all 0.4s;backdrop-filter:blur(3px);width:fit-content;}
.ci.show{opacity:1;transform:translateX(0);}
.prog-area{position:absolute;bottom:22px;right:24px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.counter{font-size:11px;color:rgba(90,154,58,0.7);font-weight:700;letter-spacing:0.12em;font-family:'Noto Serif KR',serif;}
.prog-track{width:70px;height:2px;background:rgba(90,154,58,0.18);border-radius:1px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(to right,#4a8a2a,#8ac850);border-radius:1px;width:0%;transition:width 0.1s linear;}
.dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:9px;pointer-events:all;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(90,154,58,0.28);border:1px solid rgba(90,154,58,0.35);transition:all 0.35s;cursor:pointer;}
.dot.active{background:#5a9a3a;width:22px;border-radius:3px;border-color:#5a9a3a;box-shadow:0 0 8px rgba(90,154,58,0.55);}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,0.5) 100%);pointer-events:none;}
.pt{position:absolute;border-radius:50%;background:rgba(90,154,58,0.6);animation:rise linear infinite;opacity:0;}
@keyframes rise{0%{opacity:0;transform:translateY(0) scale(1);}18%{opacity:0.7;}100%{opacity:0;transform:translateY(-95px) scale(0.2);}}
</style>

const captions=[{"step": "MOU 체결", "title": "송포농협 & 이음케어라이프\n업무협약식", "sub": "2025년 7월 9일(수) · 송포농업협동조합", "checks": ["✓ 2025년 공식 업무협약 체결 완료", "✓ 지역 농협과 후불제 상조서비스 제휴", "✓ 조합원 맞춤 서비스 협력 시작"]}, {"step": "MOMENT 01", "title": "협약서 기념 촬영", "sub": "서명 완료된 협약서를 함께 들고 기념 촬영", "checks": ["✓ 양 기관 대표자 서명 및 날인 완료", "✓ 후불제 상조서비스 공식 제휴 확정", "✓ 송포 지역 조합원 서비스 강화"]}, {"step": "MOMENT 02", "title": "협약서 교환 & 악수", "sub": "신뢰를 바탕으로 상호 협력을 약속하였습니다", "checks": ["✓ 협약서 공식 교환 완료", "✓ 상호 파트너십 확인 및 악수", "✓ 지속 가능한 협력 관계 출발"]}, {"step": "MOMENT 03", "title": "협약서 기념 촬영", "sub": "송포농협 × 이음케어라이프 파트너십 공식화", "checks": ["✓ 4장의 협약서 교환 및 보관 완료", "✓ 농협 조합원 대상 후불제 서비스 제공", "✓ 투명한 정산으로 신뢰 보장"]}, {"step": "MOMENT 04", "title": "협약서 서명", "sub": "양 기관 대표자가 협약서에 공식 서명하였습니다", "checks": ["✓ 대표자 직인 및 서명 완료", "✓ 24시간 장례 서비스 출동 체계 구축", "✓ 후불제 투명 정산 시스템 운영"]}];
const HOLD=5400,TRANS=1100;
let cur=0,timer=null,ckT=[];
const slidesEl=document.getElementById('slides');
const IDS=['gt','ctl','hl','brand','badge','mou','step','divider','title','sub'];
const els={};IDS.forEach(id=>els[id]=document.getElementById(id));
const cis=[0,1,2].map(i=>document.getElementById('ci'+i));
const pfEl=document.getElementById('pf'),counterEl=document.getElementById('counter'),dotsEl=document.getElementById('dots');
const allUI=IDS.map(id=>els[id]);
images.forEach(src=>{
  const s=document.createElement('div');s.className='slide';
  const img=document.createElement('img');img.src=src;
  s.appendChild(img);slidesEl.appendChild(s);
});
images.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.addEventListener('click',()=>goTo(i));
  dotsEl.appendChild(d);
});
const slides=slidesEl.querySelectorAll('.slide'),dots=dotsEl.querySelectorAll('.dot');
function showUI(cap){
  ckT.forEach(t=>clearTimeout(t));ckT=[];
  allUI.forEach(el=>el.classList.remove('show'));
  cis.forEach(el=>{el.classList.remove('show');el.textContent='';});
  els.step.textContent=cap.step;els.title.textContent=cap.title;els.sub.textContent=cap.sub;
  cap.checks.forEach((t,i)=>cis[i].textContent=t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    allUI.forEach(el=>el.classList.add('show'));
    cap.checks.forEach((_,i)=>{
      const t=setTimeout(()=>cis[i].classList.add('show'),800+i*130);ckT.push(t);
    });
  }));
}
function updateDots(idx){
  dots.forEach((d,i)=>d.classList.toggle('active',i===idx));
  counterEl.textContent=String(idx+1).padStart(2,'0')+' / '+String(images.length).padStart(2,'0');
}
function startProg(){
  pfEl.style.transition='none';pfEl.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    pfEl.style.transition='width '+HOLD+'ms linear';pfEl.style.width='100%';
  }));
}
function goTo(idx){
  if(idx===cur)return;clearTimeout(timer);
  const prev=cur;cur=idx;
  slides[prev].classList.remove('active');slides[prev].classList.add('exit');
  setTimeout(()=>slides[prev].classList.remove('exit'),TRANS);
  slides[cur].classList.add('active');
  updateDots(cur);showUI(captions[cur]);startProg();
  timer=setTimeout(next,HOLD);
}
function next(){goTo((cur+1)%images.length);}
slides[0].classList.add('active');updateDots(0);showUI(captions[0]);startProg();
timer=setTimeout(next,HOLD);
</script>
