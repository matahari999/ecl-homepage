<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방문요양 서비스 슬라이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a1628;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .slideshow-wrapper {
    position: relative;
    width: 720px;
    max-width: 100vw;
    aspect-ratio: 4/3;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* ── slides ── */
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0s;
  }
  .slide.active {
    opacity: 1;
    animation: kenBurns 5s ease-out forwards;
  }
  .slide.exit {
    opacity: 0;
    transition: opacity 0.9s ease-in-out;
  }

  @keyframes kenBurns {
    from { transform: scale(1.06); }
    to   { transform: scale(1.0); }
  }

  .slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── gradient overlays ── */
  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to top, rgba(5,20,40,0.88) 0%, rgba(5,20,40,0.3) 45%, transparent 70%),
      linear-gradient(to right, rgba(5,20,40,0.4) 0%, transparent 50%);
  }

  /* ── UI layer ── */
  .ui-layer {
    position: absolute; inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  /* top badge */
  .badge {
    position: absolute;
    top: 22px; right: 22px;
    background: rgba(52,175,175,0.92);
    backdrop-filter: blur(6px);
    border-radius: 30px;
    padding: 6px 18px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.08em;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.6s 0.2s, transform 0.6s 0.2s;
  }
  .badge.show { opacity: 1; transform: translateY(0); }

  /* step label */
  .step-label {
    position: absolute;
    bottom: 138px; left: 28px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: #34afaf;
    opacity: 0;
    transform: translateX(-14px);
    transition: opacity 0.5s 0.35s, transform 0.5s 0.35s;
  }
  .step-label.show { opacity: 1; transform: translateX(0); }

  /* main title */
  .main-title {
    position: absolute;
    bottom: 70px; left: 28px;
    font-size: 30px;
    font-weight: 900;
    line-height: 1.25;
    color: #fff;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.55s 0.5s, transform 0.55s 0.5s;
    white-space: pre-line;
  }
  .main-title.show { opacity: 1; transform: translateY(0); }

  /* sub text */
  .sub-text {
    position: absolute;
    bottom: 38px; left: 30px;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.72);
    letter-spacing: 0.04em;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s 0.7s, transform 0.5s 0.7s;
  }
  .sub-text.show { opacity: 1; transform: translateY(0); }

  /* accent bar */
  .accent-bar {
    position: absolute;
    bottom: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(to bottom, transparent 60%, #34afaf 100%);
    opacity: 0.85;
  }

  /* progress bar */
  .progress-bar-container {
    position: absolute;
    bottom: 22px; right: 22px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .progress-track {
    width: 80px; height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #34afaf;
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }
  .slide-counter {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  /* dots */
  .dots {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    pointer-events: all;
    cursor: pointer;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.3s;
    cursor: pointer;
  }
  .dot.active {
    background: #34afaf;
    width: 20px;
    border-radius: 3px;
  }

  /* shimmer line */
  .shimmer {
    position: absolute;
    bottom: 130px; left: 28px;
    width: 40px; height: 2px;
    background: #34afaf;
    border-radius: 1px;
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left;
    transition: opacity 0.4s 0.42s, transform 0.4s 0.42s;
  }
  .shimmer.show { opacity: 1; transform: scaleX(1); }

  /* floating sparkles */
  .sparkle {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(52,175,175,0.7);
    animation: floatUp 4s ease-in infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { opacity:0; transform: translateY(0) scale(0.5); }
    20%  { opacity:1; }
    100% { opacity:0; transform: translateY(-120px) scale(0); }
  }

</style>
</head>
<body>
<div class="slideshow-wrapper" id="wrapper">

  <!-- Slides -->
  <div id="slides-container"></div>

  <!-- UI Layer (always on top) -->
  <div class="ui-layer" id="ui">
    <div class="accent-bar"></div>
    <div class="badge" id="badge">방문요양 서비스</div>
    <div class="step-label" id="step-label">STEP 01</div>
    <div class="shimmer" id="shimmer"></div>
    <div class="main-title" id="main-title">어르신을 위한\n방문요양 서비스</div>
    <div class="sub-text" id="sub-text">이렇게 신청하세요!</div>

    <div class="progress-bar-container">
      <div class="slide-counter" id="counter">01 / 05</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="dots" id="dots"></div>

    <!-- Sparkles -->
    <div class="sparkle" style="left:15%;bottom:160px;animation-delay:0s;animation-duration:3.5s;"></div>
    <div class="sparkle" style="left:22%;bottom:140px;animation-delay:1.2s;animation-duration:4.2s;"></div>
    <div class="sparkle" style="left:8%;bottom:170px;animation-delay:2.5s;animation-duration:3.8s;"></div>
  </div>

</div>

const captions = [{"step": "STEP 01", "title": "어르신을 위한\n방문요양 서비스", "sub": "이렇게 신청하세요!"}, {"step": "STEP 02", "title": "서류 준비부터\n함께 도와드립니다", "sub": "장기요양등급 신청 · 필요 서류 준비"}, {"step": "STEP 03", "title": "따뜻한 돌봄으로\n일상을 함께합니다", "sub": "전화 상담 신청 · 방문 조사"}, {"step": "STEP 04", "title": "전문 요양사의\n방문 서비스", "sub": "방문 조사 / 심사 진행"}, {"step": "STEP 05", "title": "신뢰할 수 있는\n케어 서비스", "sub": "서비스 이용 시작"}];
const SLIDE_DURATION = 4800; // ms per slide
const TRANSITION = 900;

let current = 0;
let timer = null;
let progressTimer = null;
let progressStart = null;

const container = document.getElementById('slides-container');
const badge = document.getElementById('badge');
const stepLabel = document.getElementById('step-label');
const shimmer = document.getElementById('shimmer');
const mainTitle = document.getElementById('main-title');
const subText = document.getElementById('sub-text');
const counter = document.getElementById('counter');
const progressFill = document.getElementById('progress-fill');
const dotsEl = document.getElementById('dots');

// Build slides
images.forEach((src, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  const img = document.createElement('img');
  img.src = src;
  img.alt = '';
  slide.appendChild(img);
  container.appendChild(slide);
});

// Build dots
images.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

const slides = container.querySelectorAll('.slide');
const dots = dotsEl.querySelectorAll('.dot');

function showUI(cap) {
  // reset
  [badge, stepLabel, shimmer, mainTitle, subText].forEach(el => el.classList.remove('show'));
  
  mainTitle.textContent = cap.title;
  stepLabel.textContent = cap.step;
  subText.textContent = cap.sub;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      badge.classList.add('show');
      stepLabel.classList.add('show');
      shimmer.classList.add('show');
      mainTitle.classList.add('show');
      subText.classList.add('show');
    });
  });
}

function updateDots(idx) {
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  counter.textContent = String(idx+1).padStart(2,'0') + ' / ' + String(images.length).padStart(2,'0');
}

function startProgress() {
  progressFill.style.transition = 'none';
  progressFill.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      progressFill.style.transition = `width ${SLIDE_DURATION}ms linear`;
      progressFill.style.width = '100%';
    });
  });
}

function goTo(idx) {
  if (idx === current) return;
  clearTimeout(timer);

  const prev = current;
  current = idx;

  slides[prev].classList.remove('active');
  slides[prev].classList.add('exit');
  setTimeout(() => slides[prev].classList.remove('exit'), TRANSITION);

  slides[current].classList.add('active');
  updateDots(current);
  showUI(captions[current]);
  startProgress();

  timer = setTimeout(nextSlide, SLIDE_DURATION);
}

function nextSlide() {
  goTo((current + 1) % images.length);
}

// Init
slides[0].classList.add('active');
updateDots(0);
showUI(captions[0]);
startProgress();
timer = setTimeout(nextSlide, SLIDE_DURATION);
</script>
