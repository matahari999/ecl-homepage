    <meta name="description" content="어르신의 삶과 가족의 마음을 이어주는 종합 케어 서비스. 후불제 상조부터 요양병원 연결, 방문요양서비스 컨설팅까지 24시간 무료 상담." />

    <style>
      body { font-family: 'Noto Sans KR', sans-serif; }
      .preloader { position:fixed; inset:0; background:#f8fafc; z-index:9999; display:flex; align-items:center; justify-content:center; transition:opacity 0.8s; }
      .preloader-finish { opacity:0; visibility:hidden; }
    </style>
  </head>
  <body>
    <div class="preloader" id="preloader"><div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite"></div></div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>window.addEventListener('load',function(){document.getElementById('preloader').classList.add('preloader-finish');})</script>
  </body>
