<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>좋은 요양병원 선택 5가지 기준</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #071220;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .slideshow-wrapper {
    position: relative;
    width: 720px;
    max-width: 100vw;
    aspect-ratio: 4/3;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.06);
  }

  /* ── slides ── */
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0s;
  }
  .slide.active {
    opacity: 1;
    animation: kenBurns 5.5s ease-out forwards;
  }
  .slide.exit {
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  @keyframes kenBurns {
    from { transform: scale(1.07); }
    to   { transform: scale(1.0); }
  }
  .slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* gradient overlay */
  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to top, rgba(4,16,34,0.92) 0%, rgba(4,16,34,0.45) 42%, rgba(4,16,34,0.15) 65%, transparent 80%),
      linear-gradient(to right, rgba(4,16,34,0.55) 0%, transparent 55%);
  }

  /* ── UI Layer ── */
  .ui-layer {
    position: absolute; inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  /* Top header bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: linear-gradient(to bottom, rgba(4,16,34,0.7), transparent);
    display: flex;
    align-items: center;
    padding: 0 22px;
    justify-content: space-between;
  }
  .brand-name {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.12em;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.5s 0.1s;
  }
  .brand-name.show { opacity: 1; transform: translateY(0); }

  .badge {
    background: rgba(41,147,170,0.9);
    backdrop-filter: blur(6px);
    border-radius: 30px;
    padding: 5px 16px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.1em;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.5s 0.15s;
  }
  .badge.show { opacity: 1; transform: translateY(0); }

  /* Left accent line */
  .accent-line {
    position: absolute;
    left: 0; bottom: 0;
    width: 4px; height: 45%;
    background: linear-gradient(to top, #29a3be, transparent);
  }

  /* Step number */
  .step-num {
    position: absolute;
    bottom: 192px; left: 26px;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #29a3be;
    opacity: 0;
    transform: translateX(-12px);
    transition: all 0.5s 0.3s;
  }
  .step-num.show { opacity: 1; transform: translateX(0); }

  /* Divider */
  .divider {
    position: absolute;
    bottom: 185px; left: 26px;
    width: 36px; height: 2px;
    background: #29a3be;
    border-radius: 1px;
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left;
    transition: all 0.45s 0.4s;
  }
  .divider.show { opacity: 1; transform: scaleX(1); }

  /* Main title */
  .main-title {
    position: absolute;
    bottom: 138px; left: 26px;
    font-size: 28px;
    font-weight: 900;
    line-height: 1.3;
    color: #fff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(18px);
    transition: all 0.55s 0.48s;
  }
  .main-title.show { opacity: 1; transform: translateY(0); }

  /* Sub text */
  .sub-text {
    position: absolute;
    bottom: 112px; left: 26px;
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.02em;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s 0.62s;
    max-width: 480px;
  }
  .sub-text.show { opacity: 1; transform: translateY(0); }

  /* Checklist */
  .checklist {
    position: absolute;
    bottom: 36px; left: 26px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .check-item {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.82);
    background: rgba(41,163,190,0.12);
    border: 1px solid rgba(41,163,190,0.25);
    border-radius: 4px;
    padding: 4px 10px;
    display: inline-block;
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.4s;
    backdrop-filter: blur(2px);
    width: fit-content;
  }
  .check-item.show { opacity: 1; transform: translateX(0); }

  /* Progress area */
  .progress-area {
    position: absolute;
    bottom: 20px; right: 22px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .slide-counter {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 700;
    letter-spacing: 0.12em;
  }
  .progress-track {
    width: 72px; height: 2px;
    background: rgba(255,255,255,0.12);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #29a3be;
    border-radius: 1px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Dots */
  .dots {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    pointer-events: all;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.28);
    transition: all 0.35s;
    cursor: pointer;
  }
  .dot.active {
    background: #29a3be;
    width: 22px;
    border-radius: 3px;
  }

  /* Floating particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(41,163,190,0.55);
    animation: rise linear infinite;
    opacity: 0;
  }
  @keyframes rise {
    0%   { opacity:0; transform: translateY(0) scale(1); }
    15%  { opacity:0.8; }
    100% { opacity:0; transform: translateY(-100px) scale(0.3); }
  }

  /* Corner glow */
  .corner-glow {
    position: absolute;
    bottom: -60px; left: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(41,163,190,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="slideshow-wrapper" id="wrapper">

  <div id="slides-container"></div>

  <div class="ui-layer" id="ui">
    <div class="accent-line"></div>
    <div class="corner-glow"></div>

    <!-- Top bar -->
    <div class="top-bar">
      <span class="brand-name" id="brand-name">요양병원 선택 가이드</span>
      <span class="badge" id="badge">5가지 필수 체크리스트</span>
    </div>

    <!-- Content -->
    <div class="step-num" id="step-num">CHECK 01</div>
    <div class="divider" id="divider"></div>
    <div class="main-title" id="main-title">전문 의료진 &amp; 인력 충분성</div>
    <div class="sub-text" id="sub-text">전문의·간호사·재활치료사 비율 반드시 확인하세요</div>
    <div class="checklist" id="checklist">
      <div class="check-item" id="ci0"></div>
      <div class="check-item" id="ci1"></div>
      <div class="check-item" id="ci2"></div>
    </div>

    <!-- Progress -->
    <div class="progress-area">
      <div class="slide-counter" id="counter">01 / 05</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="dots" id="dots"></div>

    <!-- Particles -->
    <div class="particle" style="left:8%;bottom:180px;width:4px;height:4px;animation-duration:4s;animation-delay:0s;"></div>
    <div class="particle" style="left:14%;bottom:160px;width:3px;height:3px;animation-duration:5.2s;animation-delay:1.3s;"></div>
    <div class="particle" style="left:5%;bottom:200px;width:5px;height:5px;animation-duration:3.8s;animation-delay:2.7s;"></div>
    <div class="particle" style="left:20%;bottom:170px;width:3px;height:3px;animation-duration:6s;animation-delay:0.8s;"></div>
  </div>

</div>

// Build slides
images.forEach(src => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  const img = document.createElement('img');
  img.src = src;
  slide.appendChild(img);
  container.appendChild(slide);
});

// Build dots
images.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

  checkTimers.forEach(t => clearTimeout(t));

  cap.check.forEach((txt, i) => {
    checkItems[i].textContent = txt;

      divider.classList.add('show');
      mainTitle.classList.add('show');
      subText.classList.add('show');

      cap.check.forEach((_, i) => {
        const t = setTimeout(() => checkItems[i].classList.add('show'), 750 + i * 120);
        checkTimers.push(t);
      });
    });
  });
}

function updateDots(idx) {
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  counter.textContent = String(idx+1).padStart(2,'0') + ' / ' + String(images.length).padStart(2,'0');
}

function startProgress() {
  progressFill.style.transition = 'none';
  progressFill.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    progressFill.style.transition = `width ${SLIDE_DURATION}ms linear`;
    progressFill.style.width = '100%';
  }));
}

function goTo(idx) {
  if (idx === current) return;
  clearTimeout(timer);
  const prev = current;
  current = idx;

  slides[prev].classList.remove('active');
  slides[prev].classList.add('exit');
  setTimeout(() => slides[prev].classList.remove('exit'), TRANSITION);

  slides[current].classList.add('active');
  updateDots(current);
  showUI(captions[current]);
  startProgress();
  timer = setTimeout(nextSlide, SLIDE_DURATION);
}

function nextSlide() { goTo((current + 1) % images.length); }

// Init
slides[0].classList.add('active');
updateDots(0);
showUI(captions[0]);
startProgress();
timer = setTimeout(nextSlide, SLIDE_DURATION);
</script>
</body>
