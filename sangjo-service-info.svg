<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="500" fill="url(#bg)" rx="0"/>

  <!-- 배경 패턴 원 -->
  <circle cx="750" cy="80" r="150" fill="rgba(59,130,246,0.06)"/>
  <circle cx="800" cy="400" r="100" fill="rgba(59,130,246,0.04)"/>
  <circle cx="100" cy="450" r="120" fill="rgba(30,58,138,0.2)"/>

  <!-- 상단 배지 -->
  <rect x="40" y="40" width="180" height="34" rx="17" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="130" y="62" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#60a5fa" letter-spacing="1">🎖️ 후불제 상조 서비스</text>

  <!-- 메인 제목 -->
  <text x="40" y="115" font-family="'Noto Sans KR', sans-serif" font-size="32" font-weight="800" fill="#ffffff">제대군인이음케어라이프</text>
  <text x="40" y="155" font-family="'Noto Sans KR', sans-serif" font-size="32" font-weight="800" fill="url(#accent)">상조 서비스 종합 안내</text>
  <text x="40" y="190" font-family="'Noto Sans KR', sans-serif" font-size="15" fill="rgba(148,163,184,1)" letter-spacing="0.5">고객과 가족의 삶을 존중하고 지키는 맞춤형 케어</text>

  <!-- 구분선 -->
  <line x1="40" y1="210" x2="200" y2="210" stroke="url(#accent)" stroke-width="2"/>

  <!-- 카드 1: 후불제 -->
  <rect x="40" y="235" width="190" height="130" rx="16" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="55" y="268" font-family="'Noto Sans KR', sans-serif" font-size="22">💳</text>
  <text x="83" y="270" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#60a5fa">후불제 결제</text>
  <text x="55" y="295" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="rgba(203,213,225,0.9)">선납 없이 서비스 먼저,</text>
  <text x="55" y="313" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="rgba(203,213,225,0.9)">비용은 나중에 지불</text>
  <text x="55" y="342" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="800" fill="#ffffff">₩<tspan fill="#3b82f6">0</tspan> 선납금</text>

  <!-- 카드 2: 요양병원 -->
  <rect x="248" y="235" width="190" height="130" rx="16" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="263" y="268" font-family="'Noto Sans KR', sans-serif" font-size="22">🏥</text>
  <text x="291" y="270" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#60a5fa">요양병원 연결</text>
  <text x="263" y="295" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="rgba(203,213,225,0.9)">전국 네트워크 기반</text>
  <text x="263" y="313" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="rgba(203,213,225,0.9)">맞춤형 병원 매칭</text>
  <text x="263" y="342" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="800" fill="#ffffff"><tspan fill="#3b82f6">전국</tspan> 연계망</text>

  <!-- 카드 3: 방문요양 -->
  <rect x="456" y="235" width="190" height="130" rx="16" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="471" y="268" font-family="'Noto Sans KR', sans-serif" font-size="22">🏠</text>
  <text x="499" y="270" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#60a5fa">방문 요양</text>
  <text x="471" y="295" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="rgba(203,213,225,0.9)">가정에서 받는</text>
  <text x="471" y="313" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="rgba(203,213,225,0.9)">전문 요양 서비스</text>
  <text x="471" y="342" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="800" fill="#ffffff"><tspan fill="#3b82f6">24</tspan>시간 대응</text>

  <!-- 카드 4: 장기요양 -->
  <rect x="664" y="235" width="196" height="130" rx="16" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="679" y="268" font-family="'Noto Sans KR', sans-serif" font-size="22">📋</text>
  <text x="707" y="270" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#60a5fa">장기요양보험</text>
  <text x="679" y="295" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="rgba(203,213,225,0.9)">등급 신청부터</text>
  <text x="679" y="313" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="rgba(203,213,225,0.9)">급여 혜택 안내까지</text>
  <text x="679" y="342" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="800" fill="#ffffff"><tspan fill="#3b82f6">무료</tspan> 상담</text>

  <!-- 하단 통화 유도 -->
  <rect x="40" y="395" width="820" height="68" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
  <text x="460" y="420" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="rgba(148,163,184,1)">24시간 무료 상담 전화</text>
  <text x="460" y="450" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#ffffff">📞 <tspan fill="url(#accent)">1588-9012</tspan></text>
</svg>
